# GitHub Action for dev builds
# https://docs.github.com/en/actions
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax

# Devbuilds release creation steps are based on UZDoom workflow.

name: dev-builds

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Allow only one concurrent deployment, skipping runs queued between the run
# in-progress and latest queued. However, do NOT cancel in-progress runs as we want
# to allow these production deployments to complete.
concurrency:
  group: 'dev-build'
  cancel-in-progress: false

env:
  uzdoom-version: '4.14.3'

jobs:
  build:
    permissions:
      actions: read
      # Allow to create dev-builds tag:
      contents: write
      # Allow deployment to GitHub Pages:
      id-token: write
      pages: write
    runs-on: ubuntu-latest
    steps:
      - name: Check out
        uses: actions/checkout@v6

      # TODO: when Ubuntu 26.04 is available as GitHub runner, install Emacs with apt.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install libfuse2t64 libpulse0
          sudo snap install emacs --classic

      - name: Cache UZDoom
        id: cache-uzdoom
        uses: actions/cache@v5
        with:
          path: ~/UZDoom.AppImage
          key: ${{ runner.os }}-uzdoom-v${{ env.uzdoom-version }}

      - if: ${{ steps.cache-uzdoom.outputs.cache-hit != 'true' }}
        name: Install UZDoom
        run: |
          wget -qO- https://github.com/UZDoom/UZDoom/releases/download/${{ env.uzdoom-version }}/Linux-UZDoom-${{ env.uzdoom-version }}.AppImage > ~/UZDoom.AppImage
          chmod +x ~/UZDoom.AppImage

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'tools/requirements-dev.txt'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r tools/requirements-dev.txt;

      - name: Cache prek
        id: prek
        uses: actions/cache@v5
        with:
          path: ~/.cache/prek
          key: ${{ runner.os }}-prek-v${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Check prek hooks
        run: |
          prek run -a

      - name: Check compatibility
        if: ${{ success() }}
        run: |
          xvfb-run --server-args "-screen 0 640x480x24" --auto-servernum scons CheckCompatibility

      - name: Test
        if: ${{ success() }}
        run: |
          xvfb-run --server-args "-screen 0 640x480x24" --auto-servernum scons TestAll

      - name: Build
        if: ${{ success() }}
        run: |
          scons Pk3All

      - name: Devbuilds - update tag
        if: ${{ success() }}
        run: |
          git tag -d dev-builds || true
          git push origin :refs/tags/dev-builds || true
          git tag dev-builds ${{ github.event.workflow_run.head_sha }}
          git push origin dev-builds

      - name: Devbuilds - upload
        uses: softprops/action-gh-release@v2.5.0
        with:
          name: DoomToolbox Devbuilds
          tag_name: dev-builds
          draft: false
          prerelease: true
          make_latest: false
          generate_release_notes: false
          files: build/*.pk3
          body: |
            Warning: these packages may contain bugs or unfinished features.

      - name: Clean up build
        if: ${{ success() }}
        run: |
          rm -r build

      - name: Export to HTML
        if: ${{ success() }}
        run: |
          scons HtmlAll

      - name: Configure pages
        if: ${{ success() }}
        uses: actions/configure-pages@v6

      - name: Upload pages
        if: ${{ success() }}
        uses: actions/upload-pages-artifact@v4
        with:
          # Upload entire repository
          path: '.'

      - name: Deploy pages to GitHub Pages
        if: ${{ success() }}
        id: deployment
        uses: actions/deploy-pages@v5

  build_windows:
    runs-on: windows-2022
    env:
      emacs-version: '30.1.0'

    steps:
      - name: Check out
        uses: actions/checkout@v6

      - name: Cache Emacs
        id: cache-emacs
        uses: actions/cache@v5
        with:
          path: c:\tools\emacs
          key: ${{ runner.os }}-emacs-v${{ env.emacs-version }}

      # TODO: add emacs to PATH.
      - if: ${{ steps.cache-emacs.outputs.cache-hit != 'true' }}
        name: Install Emacs
        run: |
          choco install emacs --version ${{ env.emacs-version }}

      # No point if I cannot run UZDoom (see comments below).
      #- name: Cache UZDoom
      #  id: cache-uzdoom
      #  uses: actions/cache@v5
      #  with:
      #    path: ~/UZDoom
      #    key: ${{ runner.os }}-uzdoom-v${{ env.uzdoom-version }}
      #
      #- if: ${{ steps.cache-uzdoom.outputs.cache-hit != 'true' }}
      #  name: Install UZDoom
      #  shell: bash
      #  run: |
      #    curl -kLSs https://github.com/UZDoom/UZDoom/releases/download/${{ env.uzdoom-version }}/Windows-UZDoom-${{ env.uzdoom-version }}.zip -o ~/UZDoom.zip
