      #    unzip ~/UZDoom.zip -d ~/UZDoom

      - name: Install Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'
          cache: 'pip'
          cache-dependency-path: 'tools/requirements-dev.txt'

      - name: Install Python dependencies
        shell: bash
